langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true

    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: qwen-plus
      log-requests: true
      log-responses: true

    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY}
      model-name: text-embedding-v4
      log-requests: true
      log-responses: true
      max-segments-per-batch: 10

  milvus:
    host: localhost
    port: 19530
    username: root
    password:
    # 用户日志 collection
    user-log-collection-name: chat_log_vectors
    # 知识库 collection
    knowledge-collection-name: knowledge_base_vectors
    dimension: 1024


elasticsearch:
  scheme: https
  host: localhost
  port: 9201
  username: elastic
  password: "En8=M6diVNsOEedBg3Ig"
  ca-cert-path: "./http_ca.crt"
  knowledge-index: knowledge_base_bm25
  user-log-index: user_log_bm25

spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/health_app?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:

  security:
    user:
      name: disabled
      password: disabled

  mvc:
    async:
      request-timeout: 120000  # 120秒，覆盖默认的30秒，避免计划生成（多轮LLM调用）超时

mybatis:
  mapper-locations: classpath*:org/bupt/demoapp/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: logs/planner-agent.log
  level:
    # LangChain4j 框架日志（DEBUG 可看到 LLM 的 tool call 决策、请求/响应完整内容）
    dev.langchain4j: debug
    # Plan Agent 专项日志（Tool 调用链、耗时、入参出参）
    org.bupt.demoapp.agent: debug
    # 应用业务日志
    org.bupt.demoapp: info
    # Spring 框架日志
    org.springframework: info
    # SQL 日志
    org.bupt.demoapp.mapper: debug
